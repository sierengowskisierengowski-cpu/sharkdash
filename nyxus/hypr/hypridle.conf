# ─────────────────────────────────────────────────────────────────────
# NYXUS · hypridle configuration
# Lives at: ~/.config/hypr/hypridle.conf
#
# Idle pipeline (DARK MIRROR · enterprise-grade · Comet-Fire r2):
#   180s  → dim screen + open EWW screensaver overlay (clock + brand)
#   300s  → run hyprlock (full lock, biometrics-aware)
#   420s  → screen off (dpms) — lock screen stops burning the panel
#   600s  → suspend the system
#
# All on-resume actions restore brightness and tear the EWW overlay
# back down so the user lands on a clean session.
#
# © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ─────────────────────────────────────────────────────────────────────

general {
  lock_cmd       = pidof hyprlock || hyprlock
  before_sleep_cmd = pidof hyprlock || hyprlock
  after_sleep_cmd  = hyprctl dispatch dpms on
  ignore_dbus_inhibit = false
}

# 180 s — dim + screensaver overlay
listener {
  timeout      = 180
  on-timeout   = brightnessctl -s set 10% ; eww open screensaver 2>/dev/null || true
  on-resume    = brightnessctl -r ; eww close screensaver 2>/dev/null || true
}

# 300 s — full lock
# NOTE (2026-07-11 recovery): call hyprlock directly instead of
# `loginctl lock-session`. The loginctl signal only locks if something
# is subscribed to the session Lock() signal; calling hyprlock directly
# guarantees the lock actually happens.
listener {
  timeout      = 300
  on-timeout   = eww close screensaver 2>/dev/null || true; pidof hyprlock || hyprlock
  on-resume    = brightnessctl -r
}

# 420 s — panel off (Comet-Fire r2 · 2026-07-11). The session is
# already locked at 300s; two minutes later stop lighting the lock
# screen. Any key/mouse wakes the panel straight back into hyprlock
# (mouse_move_enables_dpms / key_press_enables_dpms are on in
# hyprland.conf misc{}).
listener {
  timeout      = 420
  on-timeout   = hyprctl dispatch dpms off
  on-resume    = hyprctl dispatch dpms on
}

# 600 s — suspend
listener {
  timeout      = 600
  on-timeout   = systemctl suspend
}
