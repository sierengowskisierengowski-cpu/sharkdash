# ============================================================
#  NYXUS — COMET-FIRE add-on layer (rev r1 · 2026-07-11)
#  ~/.config/hypr/conf.d/nyxus-cometfire.conf
#
#  Self-contained add-on shard, sourced LAST from hyprland.conf.
#  Everything fire-related lives here so it can be removed with
#  one `rm` + `hyprctl reload` and never collides with the other
#  shards (bars/flyouts are being restyled in parallel).
#
#  ── SHARED DESIGN TOKENS (comet-fire ramp) ──────────────────
#  Extracted from the eww fireball/comet bar layers — keep every
#  comet-fire consumer (borders, trails, lock, terminals, SDDM)
#  on this exact ramp:
#     core   #fff4d6   white-hot comet head
#     gold   #ffc450   inner corona
#     amber  #ff8c28   flame body
#     ember  #ff5a14   trailing fire
#     tail   #784bff   violet fade into the void (house purple)
#     ink    #07050e   void
#
#  ── REVERT IF YOU HATE IT ───────────────────────────────────
#    rm ~/.config/hypr/conf.d/nyxus-cometfire.conf
#    hyprctl reload
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# ── 1 · FIREBALL BORDER — rotating comet ring ───────────────────────
# The focused window wears the comet: white-hot head into gold/amber
# flame, ember tail fading through violet into the void, mirrored so
# the rotating gradient reads as one continuous fireball orbiting the
# frame. Driven by the borderangle loop below.
#
# NOTE: the per-app tint daemon (nyxus-tintd, Super+T) REPLACES these
# colors while it runs — the ring below is the house baseline the
# desktop returns to when tint is off.
general {
    col.active_border = rgba(fff4d6ff) rgba(ffc450ff) rgba(ff8c28ff) rgba(ff5a14ff) rgba(784bffdd) rgba(ff5a14ff) rgba(ff8c28ff) rgba(ffc450ff) 45deg
    col.inactive_border = rgba(ff8c2822) rgba(784bff22) rgba(07050e44) 135deg
}

# One full orbit every ~26s — slow enough to be ambient, fast enough
# that the eye catches the comet head sweeping a corner now and then.
# linear + loop = constant angular velocity, no easing "stutter" at
# the loop seam.
animations {
    animation = borderangle, 1, 260, linear, loop
}

# The focused window floats on a warm ember bloom instead of the old
# violet halo, so the shadow agrees with the ring wrapped around it.
decoration {
    shadow {
        color = rgba(ff5a1438)
        color_inactive = rgba(00000033)
    }
}

# ── 2 · HYPRTRAILS — comet tail on moving windows (PREPPED) ─────────
# Styling is declared here but the plugin is NOT loaded by default
# (plugin{} blocks are inert until the .so is live, so this parses
# cleanly today). Once hyprtrails is installed/loaded the trail comes
# up already wearing the fireball gradient. Install options in
# nyxus-core docs / the add-on notes.
plugin {
    hyprtrails {
        color = rgba(ff8c28aa)
        bezier_step    = 0.025
        points_per_step = 2
        history_points  = 20
        history_step    = 2
        fade_out_time   = 1000
    }

    # ── 3 · HYPREXPO — Mission Control, comet-fire dress ────────────
    # Base config lives in nyxus-hyprland-mission.conf; these override
    # the grid chrome onto the void + ember language.
    hyprexpo {
        columns          = 3
        gap_size         = 6
        bg_col           = rgb(07050e)
        workspace_method = center current
    }
}

# hyprexpo ships pre-built against this exact Hyprland ABI in
# ~/.local/lib/nyxus-plugins — auto-load it so SUPER+F3 / SUPER+ALT+A
# work from boot. nyxus-plugins validates the ABI and no-ops cleanly
# (with a notification) after a Hyprland upgrade, so this can't brick
# a session.
exec-once = sleep 2 && ~/.local/bin/nyxus-plugins load hyprexpo

# ── 4 · EMBER SCREEN SHADER on boot restore ─────────────────────────
# The ember filter (warm vibrance + gentle highlight glow) is part of
# the nyxus-shader cycle: Super+O cycles filters, Super+Shift+O kills
# them, and nyxus-signature.conf already restores the saved filter at
# session start. Direct chord for the fireball look:
bind = $mod CTRL, O, exec, ~/.local/bin/nyxus-shader ember

# ── 5 · ANIMATED WALLPAPER CYCLER ───────────────────────────────────
# Ambient slideshow through the walls pool with a different comet-y
# awww/swww transition each swap (grow-from-cursor stays the accent
# ripple for manual swaps on Super+Alt+W). Toggle:
bind = $mod ALT SHIFT, W, exec, ~/.local/bin/nyxus-wall-cycle toggle

# ── 6 · DIMAROUND — theater lighting for popups ─────────────────────
# Auth prompts, pickers and logout dialogs dim the rest of the stage
# so the popup owns the room. (dimaround only fires while the window
# is focused — zero cost otherwise.)
windowrule = dim_around on, match:class ^(polkit-gnome-authentication-agent-1|org\.kde\.polkit-kde-authentication-agent-1)$
windowrule = dim_around on, match:class ^(gcr-prompter|pinentry-.*)$
windowrule = dim_around on, match:class ^(xdg-desktop-portal-gtk)$
windowrule = dim_around on, match:class ^(wlogout)$
windowrule = dim_around on, match:title ^(Open File|Save File|Select Folder|File Upload)$
