# ============================================================
#  NYXUS — Hyprland window rules (DARK MIRROR rev 2026-05-07 r16)
#  ~/.config/hypr/conf.d/nyxus-hyprland-rules.conf
#
#  r11 · 2026-05-10 — DEFINITIVE Hyprland 0.54.3 reality, proven by
#                     four `hyprctl configerrors` round-trips on a
#                     live MSI GS77. Stop flipping. Read carefully:
#
#                       * `windowrule = RULE, class:REGEX`
#                         → DOES NOT PARSE. Throws "invalid field
#                         RULE: missing a value" cascading 50+ red
#                         errors on the on-screen Hyprland overlay.
#                         Genuinely broken in 0.54.3 hyprlang for
#                         class-matched rules. NEVER use this form.
#
#                       * `windowrule = RULE, class:REGEX`
#                         → WORKS. Hyprland prints a "windowrule
#                         is deprecated" line into `configerrors`
#                         (forward-looking warning for the 0.55+
#                         Lua migration), but the rules ARE applied
#                         and the on-screen error overlay STAYS
#                         CLEAN. This is the form to use.
#
#                     Same logic applies to nyxus-hyprland-opacity
#                     and the per-app overrides in this file. Keep
#                     EVERYTHING on `windowrule =` until we
#                     migrate to Hyprland 0.55+ (which means a
#                     full lua rewrite anyway). LOCKED. r11 final.
#
#  All 11 godsapp-family apps + the flyout (panel) + the catch-alls
#  float, center, and size to a consistent 900x650.
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# -- NYXUS class apps (anything starting with "nyxus") --
windowrule = float on, match:class ^([Nn]yxus.*)$
windowrule = center on, match:class ^([Nn]yxus.*)$
windowrule = size 900 650, match:class ^([Nn]yxus.*)$

# -- 11 godsapp-family product launchers (`home` excluded — desktop dashboard) --
windowrule = float on, match:class ^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather)$
windowrule = center on, match:class ^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather)$
windowrule = size 900 650, match:class ^(godsapp|intel|notepad|notes|passwords|phantom|sage|shield|start|store|studio|weather)$

# -- io.nyxus.* / org.nyxus.* / app.nyxus.* application IDs (GTK4 app_id) --
windowrule = float on, match:class ^((io|org|app)\.nyxus\..*)$
windowrule = center on, match:class ^((io|org|app)\.nyxus\..*)$
windowrule = size 900 650, match:class ^((io|org|app)\.nyxus\..*)$

# -- The flyout (panel) — float, pin to right edge, fixed 460x680 --
windowrule = float on, match:class ^(panel|nyxus-panel)$
windowrule = pin on, match:class ^(panel|nyxus-panel)$
windowrule = size 460 680, match:class ^(panel|nyxus-panel)$

# -- NYXUS Home (pinned to workspace 0 by main hyprland.conf; no overrides here) --

# ============================================================
#  PER-APP SIZE OVERRIDES (rev r8 · 2026-05-10)
#  Migrated out of main hyprland.conf where the unified
#  `windowrule =` form was misparsing `bordersize N` and
#  cascading 30+ "invalid field" errors on screen.
#  Using `windowrule =` here — the current keyword that
#  parses cleanly on Hyprland 0.51-0.54.x.
#  These OVERRIDE the catch-all 900x650 above for apps
#  that need different dimensions.
# ============================================================

# -- NYXUS SysMon (1280x800, bordered) --
windowrule = size 1280 800, match:class ^(io\.nyxus\.sysmon)$
windowrule = border_size 1, match:class ^(io\.nyxus\.sysmon)$

# -- NYXUS Control (1280x800, bordered) --
windowrule = size 1280 800, match:class ^(io\.nyxus\.control)$
windowrule = border_size 1, match:class ^(io\.nyxus\.control)$

# -- NYXUS Notepad (compact 760x540) --
windowrule = size 760 540, match:class ^(io\.nyxus\.notepad)$

# -- NYXUS Stickies (1280x800, bordered) --
windowrule = size 1280 800, match:class ^(io\.nyxus\.stickies)$
windowrule = border_size 1, match:class ^(io\.nyxus\.stickies)$

# -- NYXUS Weather (380x560 widget, top-left) --
# r17 · 2026-07-07: pin REMOVED — pinned windows ride along on every
# workspace, which broke the "whatever I open stays on its workspace"
# contract. The widget now lives on whichever workspace it was opened on.
windowrule = size 380 560, match:class ^(io\.nyxus\.weather)$
windowrule = move 20 100, match:class ^(io\.nyxus\.weather)$

# -- NYXUS Terminal (1280x800, bordered) --
windowrule = size 1280 800, match:class ^(io\.nyxus\.terminal)$
windowrule = border_size 1, match:class ^(io\.nyxus\.terminal)$

# -- NYXUS Settings (1280x800, bordered) --
windowrule = size 1280 800, match:class ^(io\.nyxus\.settings)$
windowrule = border_size 1, match:class ^(io\.nyxus\.settings)$

# ── NYXUS Dock layer rules ───────────────────────────────────────────────
# eww renders the dock as a layer-shell surface in the `nyxus-dock`
# namespace. Keep it above normal content but below OSDs/notifications.
# No blur on the dock itself — the .dock-frame already paints its own
# frosted background; double-blurring causes shimmer on transparent
# wallpapers.
layerrule = no_anim on, match:namespace nyxus-dock
layerrule = ignore_alpha 0.05, match:namespace nyxus-dock
layerrule = no_anim on, match:namespace nyxus-dock-reveal

# eww renders the hotkeys cheat-sheet + recorder as overlay surfaces in
# the `nyxus-hotkey` namespace. Centered modal-style; allow blur but
# keep keyboard focus so the search field works immediately.
layerrule = blur on, match:namespace nyxus-hotkey
layerrule = ignore_alpha 0.05, match:namespace nyxus-hotkey
layerrule = animation slide, match:namespace nyxus-hotkey
layerrule = ignore_alpha 0.05, match:namespace nyxus-dock-reveal

# ── NYXUS Snap layer rules ──────────────────────────────────────────────
# Picker is a centered modal during drag; toast is a short flash near
# the top of the screen. Both want subtle blur, no animation jank.
layerrule = blur on, match:namespace nyxus-snap-picker
layerrule = ignore_alpha 0.05, match:namespace nyxus-snap-picker
layerrule = animation popin 90%, match:namespace nyxus-snap-picker
layerrule = no_anim on, match:namespace nyxus-snap-toast
layerrule = ignore_alpha 0.05, match:namespace nyxus-snap-toast

# ── NYXUS Mission Control layer rules ───────────────────────────────────
# Full-screen overview surface. Block focus from leaking, blur the
# wallpaper, fade in.
layerrule = blur on, match:namespace nyxus-mission
layerrule = ignore_alpha 0.05, match:namespace nyxus-mission
layerrule = animation fade, match:namespace nyxus-mission

# ── NYXUS Quick Settings layer rules ────────────────────────────────────
# Top-right drop-down. Slide in, allow blur, never below status bar.
layerrule = blur on, match:namespace nyxus-quicksettings
layerrule = ignore_alpha 0.05, match:namespace nyxus-quicksettings
layerrule = animation slide, match:namespace nyxus-quicksettings

# ── Entrance animations for the remaining overlays + flyouts ────────────
# Fullscreen overlays bloom in with a popin (spring bezier from the
# animations block gives them a gentle overshoot); bar-anchored flyouts
# slide up from the bottom bar edge like drawers. OSDs stay no_anim-free
# (default fade) so volume taps feel instant.
layerrule = animation popin 88%, match:namespace nyxus-deepcore
layerrule = animation popin 88%, match:namespace nyxus-dashboard
layerrule = animation popin 88%, match:namespace nyxus-powermenu
layerrule = animation popin 88%, match:namespace nyxus-cheatsheet
layerrule = animation slide bottom, match:namespace nyxus-wifi
layerrule = animation slide bottom, match:namespace nyxus-bluetooth
layerrule = animation slide bottom, match:namespace nyxus-mixer
layerrule = animation slide bottom, match:namespace nyxus-calendar
layerrule = animation slide bottom, match:namespace nyxus-notifications
layerrule = animation slide bottom, match:namespace nyxus-brightness
layerrule = animation slide top, match:namespace notifications
