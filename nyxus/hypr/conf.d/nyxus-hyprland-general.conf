# ============================================================
#  NYXUS — Window edges / gaps / rounding (Sprint E Total Identity rev 2026-05-07)
#  ~/.config/hypr/conf.d/nyxus-hyprland-general.conf
#
#  r2 · 2026.05.07 — Sprint E Total Identity active border (white→black).
#
#  ── ACTIVE BORDER ─────────────────────────────────────────
#  Pure white → off-white → black gradient. Reads as starlight
#  rim-light on the focused window's top-left edge fading into
#  inky black on the bottom-right. Matches the dark-mirror glass
#  treatment now applied to every NYXUS app + flyout via
#  nyxus_chrome.py r12.
#
#  ── INACTIVE BORDER ───────────────────────────────────────
#  Faded off-white → faded black, low alpha so unfocused windows
#  recede.
#
#  ── REVERT IF YOU HATE IT ─────────────────────────────────
#    rm ~/.config/hypr/conf.d/nyxus-hyprland-general.conf
#    hyprctl reload
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

general {
    # PRISM rim (rev 2026-07-06) — iridescent chromatic gradient that
    # slowly rotates around the focused window via the borderangle loop.
    # magenta → cyan → mint → cyan → magenta so the loop seam is invisible.
    col.active_border   = rgba(f27531ff) rgba(26ffe0ff) rgba(7326ffff) rgba(ff7326ff) 270deg
    col.inactive_border = rgba(f2753122) rgba(26ffe022) rgba(7326ff22) 135deg

    border_size         = 2            # 2px so highlight + shadow both visible
    gaps_in             = 10           # space between tiled windows
    gaps_out            = 20           # space to monitor edge
    layout              = dwindle      # keeps existing tiling behavior
    resize_on_border    = true

    # ── FLOATING SNAP (rev r3 · 2026-07-07) ─────────────────────────
    # Freeform mode makes floating the default, so give floats magnetic
    # edges: windows snap to each other and to monitor edges while
    # dragging — clean layouts without pixel-hunting.
    snap {
        enabled     = true
        window_gap  = 8
        monitor_gap = 12
        border_overlap = false
    }
}

# ── SMART GAPS (rev r15 · 2026-05-10) ────────────────────────────────────
# When a workspace contains exactly one TILED VISIBLE window (`w[tv1]`),
# OR has a fullscreen window (`f[1]`), kill the gaps so the window goes
# edge-to-edge. Border stays — we keep the Sprint E Total Identity rim-light glow,
# which is the signature. Multi-window workspaces keep the 10/20 gaps.
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1],   gapsout:0, gapsin:0

# ── NAMED + PERSISTENT WORKSPACES (rev r15 · 2026-05-10) ────────────────
# Give workspaces 1-6 semantic identity (WEB / CODE / TERM / FILES /
# MEDIA / COMMS) and pin them so they're ALWAYS visible in waybar, not
# just when populated. Workspace 0 (NYXUS Home) is named in the main
# hyprland.conf and stays outside this numbered range. Workspaces 7-10
# remain unnamed/lazy — created on demand for ad-hoc work.
#
# `persistent:true` keeps the workspace alive even when empty (so the
# waybar pebble doesn't disappear).
# `defaultName` is the friendly label shown by waybar's
# `format-window-separator` template.
#
# Auto-launch is INTENTIONALLY DISABLED here. To enable per slot, add:
#     on-created-empty = firefox
# to the matching workspace rule. Skipped by default because a fresh
# login would launch every pinned app at once; user should opt-in.
workspace = 1, persistent:true, defaultName:WEB
workspace = 2, persistent:true, defaultName:CODE
workspace = 3, persistent:true, defaultName:TERM
workspace = 4, persistent:true, defaultName:FILES
workspace = 5, persistent:true, defaultName:MEDIA
workspace = 6, persistent:true, defaultName:COMMS

decoration {
    rounding            = 12           # Sprint E exception: Hyprland window rounding remains 12px
    # squircle corners (rev r3 · 2026-07-07): power 3 bends the corner
    # curve continuously like iOS/macOS hardware corners instead of a
    # plain quarter-circle — subtle, but every window instantly reads
    # more "designed". (2.0 = classic round; 4.0 = very square.)
    rounding_power      = 3.0
    # NOTE: blur params live in nyxus-hyprland-blur.conf (don't dupe here)

    # Drop shadow stays ink-black (real shadow on the wallpaper, not bloom).
    shadow {
        enabled        = true
        range          = 42
        render_power   = 3
        sharp          = false
        # PRISM halo — focused window floats on a soft magenta bloom;
        # unfocused windows keep a plain ink shadow so focus is obvious.
        color          = rgba(7326ff3a)
        color_inactive = rgba(00000033)
        offset         = 0 6
    }

    # ── STARFALL INNER GLOW (rev 2026-07-11 · Hyprland 0.55 `glow`) ──
    # New 0.55 decoration: a soft moonstone-violet light bleeds inward
    # from the focused window's edge — the window glass looks lit by
    # the same nebula as the bars. Unfocused windows keep only a
    # whisper so focus stays obvious. Pairs with (does not replace)
    # the outer shadow bloom above.
    glow {
        enabled        = true
        range          = 14
        render_power   = 3
        color          = rgba(a882ff2e)
        color_inactive = rgba(784bff12)
    }
}
