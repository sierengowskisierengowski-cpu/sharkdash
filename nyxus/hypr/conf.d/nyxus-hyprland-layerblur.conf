# ============================================================
#  NYXUS — Hyprland LAYER blur (DARK MIRROR rev 2026-05-11 r7-eww)
#  ~/.config/hypr/conf.d/nyxus-hyprland-layerblur.conf
#
#  Hyprland's `decoration { blur }` block enables blur globally
#  for *windows* (xdg-toplevels). Layer-shell surfaces (EWW bars,
#  panels, popovers, notifications, launcher overlays) are
#  rendered on a separate layer and need explicit `layerrule =
#  blur` to receive the same frosted-glass effect.
#
#  Without this file, the EWW bars/dashboard/powermenu/cheatsheet/OSDs,
#  dunst notification toasts, and any wlr-layer-shell overlay show as
#  flat dark glass with NO frost behind them — the wallpaper is visible
#  through the alpha channel but the colors aren't blurred, breaking the
#  DARK MIRROR illusion.
#
#  As of 2026-05-11 (EWW migration r7-eww) waybar is removed entirely.
#  Coverage is provided by the explicit per-namespace rules below for
#  every EWW window declared in eww.yuck, plus the generic `^(nyxus.*)$`
#  catch-all for any future NYXUS-namespaced layer surface.
#
#  Rule order: `blur` enables the effect, `ignorealpha` raises
#  the threshold so fully-transparent pixels don't get blurred
#  (otherwise the blur leaks past window edges).
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# ── EWW bar surfaces (rev r7-eww — canonical, replaces all waybar rules) ──
# EWW windows expose distinct namespaces declared in eww.yuck:
#   nyxus-bar-bottom · nyxus-bar-top · nyxus-bar-left · nyxus-bar-right
#   nyxus-dashboard · nyxus-powermenu · nyxus-cheatsheet
#   nyxus-osd-volume · nyxus-osd-brightness · nyxus-osd-mic · nyxus-osd
#   nyxus-screensaver
# Each gets the same Dual-Kawase blur + alpha-clip.
layerrule = blur on, match:namespace nyxus-bar-bottom
layerrule = ignore_alpha 0.2, match:namespace nyxus-bar-bottom
layerrule = blur on, match:namespace nyxus-bar-top
layerrule = ignore_alpha 0.2, match:namespace nyxus-bar-top
layerrule = blur on, match:namespace nyxus-bar-left
layerrule = ignore_alpha 0.2, match:namespace nyxus-bar-left
layerrule = blur on, match:namespace nyxus-bar-right
layerrule = ignore_alpha 0.2, match:namespace nyxus-bar-right
layerrule = blur on, match:namespace nyxus-dashboard
layerrule = ignore_alpha 0.2, match:namespace nyxus-dashboard
layerrule = blur on, match:namespace nyxus-powermenu
layerrule = ignore_alpha 0.2, match:namespace nyxus-powermenu
layerrule = blur on, match:namespace nyxus-cheatsheet
layerrule = ignore_alpha 0.2, match:namespace nyxus-cheatsheet
layerrule = blur on, match:namespace nyxus-osd-volume
layerrule = ignore_alpha 0.2, match:namespace nyxus-osd-volume
layerrule = blur on, match:namespace nyxus-osd-brightness
layerrule = ignore_alpha 0.2, match:namespace nyxus-osd-brightness
layerrule = blur on, match:namespace nyxus-osd-mic
layerrule = ignore_alpha 0.2, match:namespace nyxus-osd-mic
layerrule = blur on, match:namespace nyxus-osd
layerrule = ignore_alpha 0.2, match:namespace nyxus-osd
layerrule = blur on, match:namespace nyxus-screensaver
layerrule = ignore_alpha 0.2, match:namespace nyxus-screensaver

# ── Dunst notification toasts ─────────────────────────────────────────────
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0.2, match:namespace notifications

# ── swaync control center + toasts ────────────────────────────────────────
layerrule = blur on, match:namespace swaync-control-center
layerrule = ignore_alpha 0.2, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.2, match:namespace swaync-notification-window

# ── Wofi / launcher / rofi overlays ───────────────────────────────────────
layerrule = blur on, match:namespace launcher
layerrule = ignore_alpha 0.2, match:namespace launcher
layerrule = blur on, match:namespace wofi
layerrule = ignore_alpha 0.2, match:namespace wofi
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0.2, match:namespace rofi

# ── Focus dim: bar-anchored flyouts darken the rest of the screen ─────────
# When a flyout opens, everything around it dims so the eye locks onto
# the panel. Overlays (dashboard/powermenu/cheatsheet/mission) instead
# carry their own fullscreen frosted backdrop via EWW .overlay-backdrop.
# OSDs and the dock are deliberately excluded - they appear during
# normal use and must not darken the workspace.
layerrule = dim_around on, match:namespace nyxus-quicksettings
layerrule = dim_around on, match:namespace nyxus-wifi
layerrule = dim_around on, match:namespace nyxus-bluetooth
layerrule = dim_around on, match:namespace nyxus-mixer
layerrule = dim_around on, match:namespace nyxus-calendar
layerrule = dim_around on, match:namespace nyxus-notifications
layerrule = dim_around on, match:namespace nyxus-brightness
layerrule = dim_around on, match:namespace nyxus-hotkey
layerrule = dim_around on, match:namespace logout_dialog
layerrule = dim_around on, match:namespace rofi

# ── Generic NYXUS layer namespaces (catch-all for future surfaces) ────────
layerrule = blur on, match:namespace ^(nyxus.*)$
layerrule = ignore_alpha 0.2, match:namespace ^(nyxus.*)$

# ── Hyprland's own popups (workspace switcher, etc.) ──────────────────────
layerrule = blur on, match:namespace hyprland
layerrule = ignore_alpha 0.2, match:namespace hyprland

# ── Logout / lock / power-menu overlays ───────────────────────────────────
layerrule = blur on, match:namespace logout_dialog
layerrule = ignore_alpha 0.2, match:namespace logout_dialog
layerrule = blur on, match:namespace hyprlock

# ── GTK4 popovers that promote to layer surfaces ──────────────────────────
# (libadwaita popovers fall back to xdg-popup, but some compositors
#  treat them as layer-shell — rule is a safe no-op if not matched.)
layerrule = blur on, match:namespace gtk4-layer-shell
layerrule = blur on, match:namespace gtk-layer-shell
