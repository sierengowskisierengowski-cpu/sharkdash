# ============================================================
#  NYXUS — Mission Control (DARK MIRROR rev r1 · 2026-05-12)
#  ~/.config/hypr/conf.d/nyxus-hyprland-mission.conf
#
#  P3.13 · Mission Control
#  ─────────────────────────────────────────────────────────
#  Mac-style "show me every workspace at once" overview using
#  the official `hyprexpo` plugin (hyprwm/hyprland-plugins).
#  Click any tile to jump to that workspace; click empty area
#  or press the toggle again to dismiss.
#
#  The plugin is installed by `nyxus-bootstrap` via `hyprpm`
#  on first boot (and re-checked on every login). Without the
#  plugin loaded the `hyprexpo:expo` dispatcher silently no-ops
#  — that's a deliberate "missing plugin = inert keybind"
#  rather than a hard error, so the rest of the desktop keeps
#  working even if the plugin failed to compile.
#
#  Keybind / gesture surface:
#    SUPER + F3              toggle Mission Control
#    4-finger swipe DOWN     toggle Mission Control (touchpad)
#    ESC                     dismiss (handled by hyprexpo)
#
#  Tuning rationale:
#    columns        3        3×3 grid → up to 9 workspaces visible
#                            without thumbnails getting too small;
#                            matches our 6 named workspaces (1-6)
#                            + room for ad-hoc 7-10.
#    gap_size       5        thin grid lines, not chunky bezels.
#    bg_col         rgb(0a0a0a)  matte ink — same as DARK MIRROR
#                                wallpaper falloff. No accent leak.
#    workspace_method center  zoom into the currently focused
#                             workspace's grid cell on dismiss
#                             (smoother than `first`).
#
#  Gesture binding rationale (rev r2 · 2026-05-12):
#  We use Hyprland's native `gesture =` syntax (core since 0.43)
#  rather than hyprexpo's internal `enable_gesture`/`gesture_*`
#  fields. The native form binds the touchpad gesture directly to
#  any dispatcher, including plugin dispatchers like `hyprexpo:expo`,
#  and is parsed by Hyprland core regardless of plugin version
#  drift. The plugin's own gesture knobs have shifted across
#  hyprwm/hyprland-plugins releases and have produced
#  `hyprctl configerrors` cascades on 0.54.3 in the past. Going
#  through core keeps the contract stable.
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

plugin {
    hyprexpo {
        columns          = 3
        gap_size         = 5
        bg_col           = rgb(0a0a0a)
        workspace_method = center current
    }
}

# ── Keybind ─────────────────────────────────────────────────
# SUPER + F3 → toggle the overview. Picked F3 because it matches
# macOS Mission Control's traditional F3 binding and there are no
# F-key conflicts in our keymap (only Super+F / Super+SHIFT+F are
# used, both for fullscreen).
bind = $mod, F3, exec, nyxus-mission-control-toggle

# ── Gesture ─────────────────────────────────────────────────
# Disabled by default until gesture syntax is standardized across
# targeted Hyprland versions. Keep Mission Control on SUPER+F3.
# gesture = 4, down, exec, nyxus-mission-control-toggle
