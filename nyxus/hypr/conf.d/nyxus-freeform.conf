# ============================================================
#  NYXUS — Freeform window mode (rev r1 · 2026-07-07)
#  ~/.config/hypr/conf.d/nyxus-freeform.conf
#
#  GENERATED by ~/.local/bin/nyxus-freeform — do not hand-edit.
#  Toggle with SUPER+ALT+T or `nyxus-freeform toggle`.
#
#  FREEFORM ON  → every new window opens floating, centered, at its
#                 natural size; you place and size it yourself and
#                 Hyprland remembers the size per app. No more
#                 half-screen splits or ever-shrinking tiles.
#  FREEFORM OFF → classic dwindle tiling (this file becomes inert).
#
#  Per-app rules in nyxus-hyprland-rules.conf still override these
#  catch-alls (they are sourced BEFORE this shard, and more-specific
#  size/move rules win at map time).
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# ── FREEFORM: ON ────────────────────────────────────────────
windowrule = float on, match:class ^(.*)$
windowrule = center on, match:class ^(.*)$
windowrule = persistent_size on, match:class ^(.*)$

# exceptions: the workspace-0 dashboard always fills its page
windowrule = float off, match:class ^(io\.nyxus\.home)$
