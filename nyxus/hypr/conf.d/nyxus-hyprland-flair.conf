# ============================================================
#  NYXUS — Prism Flair (rev r1 · 2026-07-07)
#  ~/.config/hypr/conf.d/nyxus-hyprland-flair.conf
#
#  The head-turner layer (no plugins — nothing to break on update):
#
#    1. PRISM TAB GROUPS   — merge windows into one frame with
#                            iridescent gradient tabs (Super+U)
#    2. DEPTH-OF-FIELD     — unfocused windows dim slightly, the
#                            scratchpad backdrop dims hard; the
#                            focused window visibly "comes forward"
#    3. NYXUS LENS         — buttery compositor zoom on
#                            Super+Alt+scroll (demo killer)
#    4. TERMINAL SWALLOW   — GUI apps launched from a terminal
#                            replace it instead of stacking
#    5. NYXUS PULSE        — audio-reactive prism halo: the focused
#                            window's bloom thumps with the music
#                            (Super+Alt+P toggles; r2 · 2026-07-07)
#
#  Plus: Picture-in-Picture auto-docks bottom-right, and any
#  fullscreen video inhibits hypridle so movies never get locked.
#
#  ── REVERT IF YOU HATE IT ─────────────────────────────────
#    rm ~/.config/hypr/conf.d/nyxus-hyprland-flair.conf
#    hyprctl reload
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# ── 1 · PRISM TAB GROUPS ────────────────────────────────────────────────
# Super+U merges the focused window with the next one you throw at it —
# macOS-style tabs, but the tab strip is the prism gradient over the
# triple-black glass. Cycle tabs with Super+[ and Super+].
# STARFALL rev 2026-07-11: tab frame speaks the rail dialect — moonlit
# violet trio with an ember lock state (the fireball's colors mark the
# "locked" group the way the comet marks a stressed HUD tile).
group {
    col.border_active        = rgba(ff3cacff) rgba(784bffff) rgba(2bd2ffff) rgba(ff3cacff) 270deg
    col.border_inactive      = rgba(ff3cac22) rgba(784bff22) rgba(2bd2ff22) 135deg
    col.border_locked_active = rgba(ffb050ff) rgba(ff8c28ff) 270deg

    groupbar {
        enabled     = true
        font_family = JetBrainsMono Nerd Font
        font_size   = 11
        height      = 18
        rounding    = 8
        gradients   = true
        text_color  = rgba(f2f0ffff)
        # active tab = moonstone violet sweep; inactive = ink glass
        col.active   = rgba(a882ffcc) rgba(784bffcc) 45deg
        col.inactive = rgba(0a0518aa)
    }
}

bind = $mod,       U,            togglegroup
bind = $mod SHIFT, U,            moveoutofgroup
bind = $mod,       bracketright, changegroupactive, f
bind = $mod,       bracketleft,  changegroupactive, b

# ── 2 · DEPTH-OF-FIELD ──────────────────────────────────────────────────
# Pairs with the 0.85 inactive opacity + frost: unfocused windows now sit
# a full layer back (dimmer AND blurrier through the glass), so the
# focused window with its prism ring reads like it's floating above the
# stack. dim_special darkens the desktop hard behind the Super+S
# scratchpad — proper macOS-Mission-Control theater lighting.
decoration {
    dim_inactive = true
    dim_strength = 0.12
    dim_special  = 0.35
}

# ── 3 · NYXUS LENS — compositor magnifier ──────────────────────────────
# Super+Alt+scroll zooms the whole desktop around the cursor, glass,
# blur, animations and all. Middle-click (or Super+Alt+0) snaps back.
# zoom_rigid=false makes the viewport glide after the cursor instead of
# hard-locking to it — the "expensive camera" feel.
cursor {
    zoom_rigid = false
}
bind = $mod ALT, mouse_down, exec, ~/.config/hypr/scripts/nyxus-lens.sh in
bind = $mod ALT, mouse_up,   exec, ~/.config/hypr/scripts/nyxus-lens.sh out
bind = $mod ALT, mouse:274,  exec, ~/.config/hypr/scripts/nyxus-lens.sh reset
bind = $mod ALT, equal,      exec, ~/.config/hypr/scripts/nyxus-lens.sh in
bind = $mod ALT, minus,      exec, ~/.config/hypr/scripts/nyxus-lens.sh out
bind = $mod ALT, 0,          exec, ~/.config/hypr/scripts/nyxus-lens.sh reset

# ── 4 · TERMINAL SWALLOW ────────────────────────────────────────────────
# `mpv file.mkv` from kitty: the terminal vanishes, the player takes its
# exact tile, and the terminal returns when the player exits. No dead
# terminal windows loitering behind media apps.
misc {
    enable_swallow = true
    swallow_regex  = ^([Kk]itty|[Aa]lacritty|foot|io\.nyxus\.terminal)$
}

# ── Picture-in-Picture auto-dock ───────────────────────────────────────
# Firefox "Picture-in-Picture" / Chromium "Picture in picture" pop-outs:
# pin above every workspace, dock bottom-right clear of bar-bottom, stay
# fully opaque (video should never be frosted), keep aspect on resize.
windowrule = float on,             match:title ^(Picture(-| )[Ii]n(-| )[Pp]icture)$
windowrule = pin on,               match:title ^(Picture(-| )[Ii]n(-| )[Pp]icture)$
windowrule = keep_aspect_ratio on, match:title ^(Picture(-| )[Ii]n(-| )[Pp]icture)$
windowrule = size 512 288,         match:title ^(Picture(-| )[Ii]n(-| )[Pp]icture)$
windowrule = move 100%-w-24 100%-w-84, match:title ^(Picture(-| )[Ii]n(-| )[Pp]icture)$
windowrule = opacity 1.0 1.0,      match:title ^(Picture(-| )[Ii]n(-| )[Pp]icture)$

# ── 5 · NYXUS PULSE — audio-reactive prism halo ────────────────────────
# cava taps the PipeWire monitor; the daemon maps the level to the
# focused window's shadow bloom (alpha + radius) so bass hits make the
# window visibly glow. Idle-free when silent (cava sleep_timer + the
# daemon only fires hyprctl on level change). Autostarted from
# hyprland.conf; this chord flips it live.
bind = $mod ALT, P, exec, ~/.config/hypr/scripts/nyxus-pulse.sh toggle

# ── Fullscreen video = no lock screen ──────────────────────────────────
# Any fullscreen window inhibits hypridle. Movie night never ends at the
# hyprlock prompt.
windowrule = idle_inhibit fullscreen, match:class ^(.*)$
