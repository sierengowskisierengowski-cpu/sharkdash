# ============================================================
#  NYXUS — Hyprland compositor blur (DARK MIRROR rev 2026-05-07)
#  ~/.config/hypr/conf.d/nyxus-hyprland-blur.conf
#
#  r3 · 2026.05.07 — Re-tuned for DARK MIRROR glass.
#
#  Apps now paint themselves as dark translucent glass
#  (rgba(8,12,20,0.55) panels via nyxus_chrome.py r12). The
#  blur multiplier no longer needs to whitewash the surface —
#  it should just soften what's behind so the dark glass reads
#  as a mirror, not a milk-glass cream sheet.
#
#  Brightness pulled back from 1.5 → 0.92 so the blur darkens
#  the wallpaper underneath the glass instead of brightening it.
#  Vibrancy at 0.18 keeps the wallpaper colors faintly visible
#  beneath the dark wash.
#
#  ── REVERT IF SCREEN GOES TOO DARK ──────────────────────
#    sudo sed -i 's/brightness = 0.92/brightness = 1.0/' \
#       ~/.config/hypr/conf.d/nyxus-hyprland-blur.conf
#    hyprctl reload
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

decoration {
    blur {
        enabled            = true
        size               = 14            # heavy frost
        passes             = 4             # smooth, no banding
        new_optimizations  = true
        ignore_opacity     = false
        xray               = false
        brightness         = 0.92          # darken behind glass (was 1.5)
        contrast           = 1.05          # tiny contrast lift through the glass
        vibrancy           = 0.18          # faint color through the wash
        vibrancy_darkness  = 0.30          # keep dark areas dark
        noise              = 0.06          # subtle etched-glass grain
    }
}
