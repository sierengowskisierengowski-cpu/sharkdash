# ============================================================
#  NYXUS — Signature layer (rev r1 · 2026-07-07)
#  ~/.config/hypr/conf.d/nyxus-signature.conf
#
#  Binds + autostarts for the Signature feature set:
#    1. ACCENT SYNC        — Super+Shift+W re-skins the whole
#                            desktop from the current wallpaper
#    (more sections land here as the set is built out)
#
#  ── REVERT IF YOU HATE IT ─────────────────────────────────
#    rm ~/.config/hypr/conf.d/nyxus-signature.conf
#    hyprctl reload
#
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

# ── 1 · ACCENT SYNC ─────────────────────────────────────────────────
# Extract a neon palette from whatever is on screen (still wall or a
# frame of the living wallpaper) and pipe it through nyxus-apply-accent.
bind = $mod SHIFT, W, exec, ~/.local/bin/nyxus-accent-from-wallpaper

# ── 2 · WALLPAPER RIPPLE ────────────────────────────────────────────
# Super+Alt+W cycles to a random wallpaper. The new wall ripples out
# from the cursor (swww grow transition) and, with follow_wallpaper on
# in accent.json, the whole desktop re-themes to match in the same beat.
bind = $mod ALT, W, exec, ~/.local/bin/nyxus-wall-next

# ── 3 · CAPS-LOCK OSD ───────────────────────────────────────────────
# bindn = NON-consuming: Caps_Lock still toggles normally; we just ride
# along and pop the eww OSD with the post-toggle state.
bindn = , Caps_Lock, exec, ~/.config/eww/scripts/osd-capslock.sh

# ── 4 · NYXUS FILTERS (screen shaders) ──────────────────────────────
# Full-screen GLSL post-processing, pure compositor. Super+O cycles
# off → night → vignette → crt → noir; Super+Shift+O kills it.
# The active filter survives restarts via shader.state.
bind = $mod, O, exec, ~/.local/bin/nyxus-shader next
bind = $mod SHIFT, O, exec, ~/.local/bin/nyxus-shader off
exec-once = ~/.local/bin/nyxus-shader restore

# ── 5 · BEAT — audio-reactive border ────────────────────────────────
# Super+Alt+B toggles the beat daemon: the prism ring around the
# focused window spins in time with whatever is playing (cava bass
# energy → gradient angle). Silence = ring at rest. Off by default.
# (Was Super+Shift+P, which collided with the wall-fx toggle in
# nyxus-fx.conf — both fired on one press.)
bind = $mod ALT, B, exec, ~/.local/bin/nyxus-beat toggle

# ── 6 · SHOT + LENS ─────────────────────────────────────────────────
# de-dup 2026-07-09: the grimblast nyxus-shot wrapper is retired.
# ~/.nyxus/nyxus_screenshot.py is the CANONICAL screenshot app
# (grim+slurp GTK: region/window/fullscreen/picker, --annotate,
# --ocr, --delay). Plain Print (region) and Shift+Print (picker)
# stay in hyprland.conf pointing at the same app; the Super chords
# below cover the other modes. LENS ("circle to search": drag a box,
# NYXUS OCRs the text / decodes the QR to clipboard) is unchanged.
bind = $mod,       Print, exec, python3 ~/.nyxus/nyxus_screenshot.py region
bind = $mod SHIFT, Print, exec, python3 ~/.nyxus/nyxus_screenshot.py fullscreen
bind = $mod CTRL,  Print, exec, python3 ~/.nyxus/nyxus_screenshot.py window
bind = $mod SHIFT, T,     exec, ~/.local/bin/nyxus-lens text
bind = $mod SHIFT, Q,     exec, ~/.local/bin/nyxus-lens qr

# ── 7 · BOOT CINEMATICS ─────────────────────────────────────────────
# Session entrance: NYXUS curtain fades to wallpaper, then each bar
# slides in from its own edge (nyxus-eww-cinematic staggers the opens;
# these rules give every bar its directional entrance — and they
# replay on every eww reload, not just boot).
layerrule = animation slide bottom, match:namespace nyxus-bar-bottom
layerrule = animation slide top,    match:namespace nyxus-bar-top
layerrule = animation slide left,   match:namespace nyxus-bar-left
layerrule = animation slide right,  match:namespace nyxus-bar-right
layerrule = animation fade, match:namespace nyxus-splash
layerrule = blur off,       match:namespace nyxus-splash

# ── 8 · PLUGINS (opt-in, never auto-loaded) ─────────────────────────
# Three plugins are built from source in ~/.local/lib/nyxus-plugins,
# managed by `nyxus-plugins <status|load|unload|toggle> <name>`:
#   hyprexpo · dynamic-cursors · hyprfocus
# NYXUS stays pure-compositor until you load one — nothing to break
# on update. REBUILD after any Hyprland upgrade before loading.
# Super+Alt+A = overview. A plain `bind = ..., hyprexpo:expo, toggle`
# gets silently DROPPED while the dispatcher doesn't exist, so this
# goes through exec: first press loads the plugin, then toggles.
bind = $mod ALT, A, exec, sh -c '~/.local/bin/nyxus-plugins load hyprexpo >/dev/null 2>&1; hyprctl dispatch hyprexpo:expo toggle'
# To auto-load at boot once you trust them, uncomment:
# exec-once = ~/.local/bin/nyxus-plugins load hyprfocus
# exec-once = ~/.local/bin/nyxus-plugins load dynamic-cursors
# exec-once = ~/.local/bin/nyxus-plugins load hyprexpo

# ── 9 · PER-APP BORDER TINT ─────────────────────────────────────────
# Super+T: every app class hashes to its own neon — the focus ring
# re-tints live as you flick between windows (Firefox is always
# Firefox-colored, on every boot). Coexists with BEAT: tint owns the
# colors, beat owns the spin. Started by LIVING THEME below.
bind = $mod, T, exec, ~/.local/bin/nyxus-tint toggle

# ── 9b · LIVING THEME ───────────────────────────────────────────────
# Super+Alt+L: the whole shell comes alive — tintd (colors follow the
# app you're on; follow_mouse=1 makes it hover-reactive) + pulsed
# (notifications/email/chat/alerts fire color pulses across the window
# borders AND the four bar rims; workspace switches sweep; critical
# alerts strobe red). Coexists with BEAT (angle) and the accent engine
# (baseline). ON at boot — this is the signature look.
bind = $mod ALT, L, exec, ~/.local/bin/nyxus-living toggle
exec-once = sleep 2 && ~/.local/bin/nyxus-living on

# ── 9c · GRAFFITI FX (folded in from nyxus-fx.conf, 2026-07-09) ─────
# The old conf.d/nyxus-fx.conf was never sourced, so these were dead.
# Spray moved from Super+G (collides with the live deepcore bind) to
# Super+Z; wall-fx toggle keeps Super+Shift+P (free — beat toggle
# vacated it for Super+Alt+B long ago).
bind = $mod, Z, exec, ~/.local/bin/nyxus-spray
bind = $mod SHIFT, P, exec, sh -c '~/.local/bin/nyxus-wall-fx toggle; notify-send "NYXUS wall-fx" "$(~/.local/bin/nyxus-wall-fx status)"'

# ── 10 · UI SOUND DESIGN ────────────────────────────────────────────
# Synthesized console blips (nyxus-sound-forge makes them from pure
# math). soundd rides the Hyprland event socket: open/close blips,
# workspace ticks; screenshots click; the boot curtain swells.
# Master switch: `nyxus-sounds toggle` (flag file, instant, global).
exec-once = ~/.local/bin/nyxus-soundd
