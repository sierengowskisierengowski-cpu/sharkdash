# ============================================================
#  NYXUS — Hyprlock · Prism HUD
#  ~/.config/hypr/hyprlock.conf
#
#  rev 2026-07-09 r4 (HUD language) — rethemed to match the
#  nyxus-home dashboard reference: near-black card surfaces,
#  1px neon hairline borders with a 2px neon top rule, chunky
#  Orbitron numerals, small-caps neon labels, Caveat script
#  flourish for the greeting, prism-gradient input rim.
#
#  Accent discipline: primary/secondary neon rides the tokens in
#  hyprlock-accent.conf (generated by nyxus-apply-accent §3).
#  Fixed LOCKED palette constants (gold #ff8b26, red #ff4d6b,
#  cyan #66efff, white-off #e8edf5, greys, card ink #07050e)
#  are hardcoded by design — they never re-skin.
#
#  Layout (centre-anchored frame; positive Y is up):
#    +470  greeting          (Caveat 38, script flourish)
#    +360…0   CLOCK CARD     (640×360 shape, ink fill, neon rim)
#      +359    2px accent top rule
#      +322    S Y S T E M · L O C K E D   (gold small-caps)
#      +232    HH:MM         (Orbitron ExtraBold 92, accent)
#      +146    seconds       (mono 20, accent2)
#      +104    date          (mono 12, spaced)
#      + 52    weekday       (Caveat 26)
#      + 16    card footer stamp
#    - 40  ◤ X ◥ glyph       (accent, glow)
#    - 95  NYXUS wordmark    (Permanent Marker)
#    -140  daily line        (Caveat, cyan)
#    -205  password input    (380×54, prism gradient rim)
#    -270  wrong-pw msg
#    -300  layout · caps
#    corners: hostname/kernel (top-left), weather (top-right),
#             now-playing card (bottom-left), © (bottom-centre)
#
#  Silent. Dark. Purely Functional.
#  © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
# ============================================================

general {
    hide_cursor        = true
    ignore_empty_input = false
    text_trim          = true
}

# nyxus accent — written by nyxus-apply-accent (Settings → Appearance).
# Defines $nyxus_accent_* and $nyxus_accent2_* tokens. Sourced
# unconditionally; hyprlock silently ignores a missing source.
source = ~/.config/hypr/hyprlock-accent.conf

# ── BACKGROUND ──────────────────────────────────────────────
# Graffiti-space wall under heavy blur + ink wash: same world as the
# desktop, dark enough for neon hairlines to read. Falls back to flat
# ink if the path 404s, so keep both `path` and `color` set.
background {
    monitor           =
    color             = rgb(05010D)
    path              = ~/.config/hypr/walls/nyxus-graffiti-space.png
    blur_size         = 5
    blur_passes       = 3
    brightness        = -0.15
    contrast          = 1.0
    vibrancy          = 0.18
    vibrancy_darkness = 0.10
}

# ── GREETING (script flourish, HUD header style) ────────────
label {
    monitor     =
    text        = welcome back, <span foreground='##e8edf5'>$USER</span>
    color       = $nyxus_accent_rgba
    font_size   = 38
    font_family = Caveat

    shadow_passes = 2
    shadow_size   = 12
    shadow_color  = $nyxus_accent_glow
    shadow_boost  = 1.4

    position = 0, 470
    halign   = center
    valign   = center
}

# ── CLOCK CARD (shape: ink fill · 1px neon hairline) ────────
shape {
    monitor     =
    size        = 640, 360
    color       = rgba(7, 5, 14, 0.88)
    rounding    = 8
    border_size = 1
    border_color = $nyxus_accent_dim

    shadow_passes = 3
    shadow_size   = 18
    shadow_color  = $nyxus_accent_glow
    shadow_boost  = 1.1

    position = 0, 180
    halign   = center
    valign   = center
}

# card top rule — the HUD "border-top: 2px solid accent"
shape {
    monitor     =
    size        = 638, 2
    color       = $nyxus_accent_rgba
    rounding    = 1
    border_size = 0

    position = 0, 358
    halign   = center
    valign   = center
}

# ── CARD HEADER (small-caps neon label, gold) ───────────────
label {
    monitor     =
    text        = ◉  S Y S T E M   L O C K E D
    color       = rgba(255, 139, 38, 0.92)
    font_size   = 11
    font_family = JetBrainsMono Nerd Font Bold

    shadow_passes = 2
    shadow_size   = 8
    shadow_color  = rgba(255, 139, 38, 0.40)

    position = 0, 322
    halign   = center
    valign   = center
}

# ── CLOCK (HH:MM — chunky display numerals) ─────────────────
label {
    monitor     =
    text        = $TIME
    color       = $nyxus_accent_rgba
    font_size   = 92
    font_family = Orbitron ExtraBold

    shadow_passes = 3
    shadow_size   = 22
    shadow_color  = $nyxus_accent_glow
    shadow_boost  = 1.8

    position = 0, 232
    halign   = center
    valign   = center
}

# ── SECONDS (secondary neon) ────────────────────────────────
label {
    monitor     =
    text        = cmd[update:1000] date +"%S"
    color       = $nyxus_accent2_rgba
    font_size   = 20
    font_family = JetBrainsMono Nerd Font Bold

    shadow_passes = 1
    shadow_size   = 8
    shadow_color  = $nyxus_accent2_glow

    position = 0, 146
    halign   = center
    valign   = center
}

# ── DATE (spaced mono, dim) ─────────────────────────────────
label {
    monitor     =
    text        = cmd[update:60000] date '+%B %d %Y' | tr '[:lower:]' '[:upper:]' | sed 's/./& /g'
    color       = rgba(200, 204, 214, 0.80)
    font_size   = 12
    font_family = JetBrainsMono Nerd Font

    shadow_passes = 1
    shadow_size   = 4
    shadow_color  = rgba(0, 0, 0, 0.85)

    position = 0, 104
    halign   = center
    valign   = center
}

# ── WEEKDAY (script) ────────────────────────────────────────
label {
    monitor     =
    text        = cmd[update:60000] date +%A
    color       = rgba(232, 237, 245, 0.95)
    font_size   = 26
    font_family = Caveat

    shadow_passes = 1
    shadow_size   = 6
    shadow_color  = rgba(0, 0, 0, 0.85)

    position = 0, 52
    halign   = center
    valign   = center
}

# ── CARD FOOTER STAMP ───────────────────────────────────────
label {
    monitor     =
    text        = S Y S T E M   T I M E   ·   L O C A L
    color       = $nyxus_accent_faint
    font_size   = 8
    font_family = JetBrainsMono Nerd Font

    position = 0, 16
    halign   = center
    valign   = center
}

# ── LOGO GLYPH ──────────────────────────────────────────────
label {
    monitor     =
    text        = ◤ X ◥
    color       = $nyxus_accent_rgba
    font_size   = 40
    font_family = JetBrainsMono Nerd Font Bold

    shadow_passes = 4
    shadow_size   = 24
    shadow_color  = $nyxus_accent_glow
    shadow_boost  = 2.0

    position = 0, -40
    halign   = center
    valign   = center
}

# ── WORDMARK (graffiti) ─────────────────────────────────────
label {
    monitor     =
    text        = NYXUS
    color       = $nyxus_accent_rgba
    font_size   = 26
    font_family = Permanent Marker

    shadow_passes = 3
    shadow_size   = 14
    shadow_color  = $nyxus_accent_glow
    shadow_boost  = 1.5

    position = 0, -95
    halign   = center
    valign   = center
}

# ── DAILY LINE (easter egg: changes every midnight) ─────────
label {
    monitor     =
    text        = cmd[update:60000] ~/.config/hypr/scripts/nyxus-daily-line.sh
    color       = rgba(102, 239, 255, 0.75)
    font_size   = 16
    font_family = Caveat

    shadow_passes = 1
    shadow_size   = 5
    shadow_color  = rgba(102, 239, 255, 0.25)

    position = 0, -140
    halign   = center
    valign   = center
}

# ── PASSWORD INPUT (prism gradient rim) ─────────────────────
input-field {
    monitor =

    size              = 380, 54
    outline_thickness = 2
    dots_size         = 0.26
    dots_spacing      = 0.22
    dots_center       = true
    dots_rounding     = -1

    outer_color = $nyxus_accent_rgba $nyxus_accent2_rgba 45deg
    inner_color = rgba(7, 5, 14, 0.97)
    font_color  = $nyxus_accent_rgba
    font_family = JetBrainsMono Nerd Font

    fade_on_empty = true
    fade_timeout  = 1200

    placeholder_text = passphrase

    rounding = 8

    check_color     = rgba(255, 139, 38, 1.0)
    fail_color      = rgba(255, 77, 107, 1.0)
    fail_text       = ACCESS DENIED

    capslock_color  = rgba(255, 139, 38, 1.0)
    numlock_color   = -1
    bothlock_color  = -1
    invert_numlock  = false
    swap_font_color = false

    shadow_passes = 4
    shadow_size   = 14
    shadow_color  = $nyxus_accent_glow
    shadow_boost  = 1.3

    position = 0, -205
    halign   = center
    valign   = center
}

# ── WRONG PASSWORD ──────────────────────────────────────────
label {
    monitor     =
    text        = $FAIL
    color       = rgba(255, 77, 107, 0.95)
    font_size   = 11
    font_family = JetBrainsMono Nerd Font

    shadow_passes = 2
    shadow_size   = 8
    shadow_color  = rgba(255, 77, 107, 0.5)

    position = 0, -270
    halign   = center
    valign   = center
}

# ── LAYOUT (caps lock is signalled by the input rim going gold) ──
label {
    monitor     =
    text        = K B D · $LAYOUT[en]
    color       = rgba(255, 139, 38, 0.70)
    font_size   = 10
    font_family = JetBrainsMono Nerd Font

    shadow_passes = 1
    shadow_size   = 5
    shadow_color  = rgba(255, 139, 38, 0.3)

    position = 0, -300
    halign   = center
    valign   = center
}

# ── HOST STAMP (top-left, HUD corner chrome) ────────────────
label {
    monitor     =
    text        = cmd[update:600000] echo "$(cat /etc/hostname 2>/dev/null || echo nyxus) · $(uname -r)" | tr '[:lower:]' '[:upper:]'
    color       = rgba(200, 204, 214, 0.70)
    font_size   = 11
    font_family = JetBrainsMono Nerd Font

    shadow_passes = 1
    shadow_size   = 4
    shadow_color  = rgba(0, 0, 0, 0.85)

    position = 42, -36
    halign   = left
    valign   = top
}

# ── WEATHER (top-right, serve-stale cache) ──────────────────
label {
    monitor     =
    text        = cmd[update:600000] ~/.local/bin/nyxus-weather-line
    color       = rgba(200, 240, 255, 0.90)
    font_size   = 20
    font_family = Caveat

    shadow_passes = 1
    shadow_size   = 4
    shadow_color  = rgba(0, 0, 0, 0.85)

    position = -42, -34
    halign   = right
    valign   = top
}

# ── NOW PLAYING — album art card (bottom-left) ──────────────
# Art follows the track (MPRIS artUrl, http art cached); falls back
# to the branded prism card. Rim rides the live prism gradient.
image {
    monitor     =
    path        = ~/.cache/nyxus/lock-art-placeholder.png
    size        = 148
    rounding    = 8
    border_size = 1
    border_color = $nyxus_accent_rgba $nyxus_accent2_rgba 45deg

    reload_time = 5
    reload_cmd  = ~/.local/bin/nyxus-lock-art

    shadow_passes = 3
    shadow_size   = 16
    shadow_color  = rgba(0, 0, 0, 0.6)

    position = 60, 150
    halign   = left
    valign   = bottom
}

# ── NOW PLAYING — chip / title / artist ─────────────────────
# All three print nothing when no player is up, so the whole card
# text simply disappears (only the prism art card remains).
label {
    monitor     =
    text        = cmd[update:5000] ~/.local/bin/nyxus-lock-track chip
    color       = $nyxus_accent2_rgba
    font_size   = 11
    font_family = JetBrainsMono Nerd Font Bold

    shadow_passes = 2
    shadow_size   = 8
    shadow_color  = rgba(0, 0, 0, 0.7)

    position = 240, 258
    halign   = left
    valign   = bottom
}

label {
    monitor     =
    text        = cmd[update:5000] ~/.local/bin/nyxus-lock-track title
    color       = rgba(240, 248, 255, 0.98)
    font_size   = 21
    font_family = Orbitron Medium

    shadow_passes = 2
    shadow_size   = 10
    shadow_color  = rgba(0, 0, 0, 0.8)

    position = 240, 214
    halign   = left
    valign   = bottom
}

label {
    monitor     =
    text        = cmd[update:5000] ~/.local/bin/nyxus-lock-track artist
    color       = rgba(200, 240, 255, 0.75)
    font_size   = 14
    font_family = Caveat

    shadow_passes = 1
    shadow_size   = 6
    shadow_color  = rgba(0, 0, 0, 0.8)

    position = 241, 180
    halign   = left
    valign   = bottom
}

# ── COPYRIGHT ───────────────────────────────────────────────
label {
    monitor     =
    text        = © 2026 JOSEPH SIERENGOWSKI · NYX-J5W-2026-SIERENGOWSKI-LOCKED
    color       = rgba(106, 110, 120, 0.85)
    font_size   = 8
    font_family = JetBrainsMono Nerd Font

    position = 0, 24
    halign   = center
    valign   = bottom
}
