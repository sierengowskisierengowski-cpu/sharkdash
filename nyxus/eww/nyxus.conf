# ─────────────────────────────────────────────────────────────────────
# NYXUS · EWW central config (sourced by eww launcher + scripts)
# Lives at: ~/.config/eww/nyxus.conf
#
# Edit this file to customise the EWW stack without touching .yuck/.scss.
# All values can be overridden by exporting the same variable in your
# shell or via `systemctl --user edit nyxus-eww.service`.
# ─────────────────────────────────────────────────────────────────────

# ── Bars to open at session start (space-separated subset of:
#      bar-bottom bar-top bar-left bar-right)
# The horizontal bars MUST open before the rails: Hyprland arranges
# layer surfaces in creation order, so if the rails' 66px exclusive
# zones exist first, the full-width bars get centred in the shrunken
# area and shoved sideways/clipped (the "left gap" bug). Bars first get
# the true monitor width at x=0; the rails then fit between their zones.
NYXUS_EWW_BARS="bar-bottom bar-top bar-left bar-right"

# ── Daemon socket-wait timeout in seconds (used by nyxus-eww-launch)
NYXUS_EWW_TIMEOUT=30

# ── Optional: a custom log directory. Default: ~/.cache/nyxus-eww/
NYXUS_EWW_LOG_DIR="${XDG_CACHE_HOME:-$HOME/.cache}/nyxus-eww"

# ── Weather location override for scripts/weather.sh
#    Empty = wttr.in geo-IP guess. Set to e.g. "Honolulu" or "94016".
NYXUS_WEATHER_LOCATION=""

# ── OSD pop-up duration (seconds) — default 1.5
NYXUS_OSD_DURATION=1.5

# ── GTK icon theme for eww dock / image widgets (eww 0.5 needs this)
GTK_ICON_THEME=NYXUS-Dark

# ── Show the screensaver overlay before lock? (true|false)
NYXUS_SCREENSAVER_ENABLED=true
NYXUS_TICKER_COLS=120
# Aurora bar FX frame rate: 8 fps ~= 2% of a 20-thread box; raise to 15
# for silkier sweeps or set NYXUS_BAR_FX=off for zero-CPU static rims.
NYXUS_BAR_FX_FPS=8
